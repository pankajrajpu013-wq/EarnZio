name: earnzio
description: Social media + rewards platform where users earn coins for activities.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0

  # UI & Navigation
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  provider: ^6.1.0
  flutter_spinkit: ^5.2.1

  # Image & Media
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # Utilities
  intl: ^0.19.0
  google_sign_in: ^6.2.0
  uuid: ^4.0.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.1

  # State Management & Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Analytics & Logging
  firebase_analytics: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
